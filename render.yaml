services:
  - type: web
    name: idss
    env: python
    region: oregon
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: EXTERNAL_URL
        value: ""
      - key: PPO_MODEL_URL
        value: ""
